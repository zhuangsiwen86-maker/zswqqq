<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>随机城市云漫步器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.7);
            --card: rgba(0,0,0,0.55);
            --border: rgba(255,255,255,0.12);
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f0f;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        #bgImage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        #bgImage.loaded { opacity: 1; }
        #bgOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.7));
            z-index: 1;
        }
        #effectCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            padding-bottom: 160px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        header {
            text-align: center;
            opacity: 0;
            animation: fadeInDown 1s ease-out 0.3s forwards;
            padding: 1rem 0;
        }
        header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 0.3rem;
        }
        header p {
            font-size: 0.85rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }
        .city-card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
            max-width: 900px;
            margin: 0 auto 200px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 280px);
        }
        .card-header {
            padding: 2rem;
            background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(16,185,129,0.08), rgba(6,182,212,0.06));
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .weather-icon {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }
        .city-name {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .city-subtitle {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 1.25rem;
            font-weight: 300;
        }
        .city-meta {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .meta-label {
            font-size: 0.7rem;
            opacity: 0.45;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .meta-value {
            font-size: 1rem;
            font-weight: 500;
        }
        .card-body {
            padding: 2rem;
            overflow-y: auto;
            flex: 1;
        }
        .card-body::-webkit-scrollbar { width: 4px; }
        .card-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .card-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        
        .city-mood {
            font-size: 1.15rem;
            line-height: 1.7;
            font-weight: 300;
            font-style: italic;
            opacity: 0.75;
            text-align: center;
            margin-bottom: 1.75rem;
            padding: 1rem;
        }
        .city-desc {
            font-size: 1rem;
            line-height: 1.8;
            opacity: 0.85;
            margin-bottom: 1.75rem;
            text-align: justify;
            padding: 1.25rem;
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            border-left: 3px solid rgba(251,191,36,0.5);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            margin-bottom: 1.75rem;
        }
        .info-card {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .info-card h4 {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.4rem 0;
            font-size: 0.9rem;
            opacity: 0.85;
        }
        .info-item .icon { font-size: 1.1rem; }
        
        .street-scene {
            background: rgba(6,182,212,0.08);
            border: 1px solid rgba(6,182,212,0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.75rem;
            display: flex;
            gap: 1.25rem;
        }
        .street-scene .icon {
            font-size: 2rem;
            flex-shrink: 0;
        }
        .street-scene .text {
            font-size: 0.95rem;
            line-height: 1.7;
            opacity: 0.85;
        }
        
        .architecture-list {
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(124,58,237,0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.75rem;
        }
        .architecture-list h4 {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .arch-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .arch-item:last-child { border-bottom: none; }
        .arch-item .icon { font-size: 1.5rem; flex-shrink: 0; }
        .arch-item .info .name { font-size: 1rem; opacity: 0.95; margin-bottom: 0.35rem; font-weight: 500; }
        .arch-item .info .desc { font-size: 0.85rem; opacity: 0.65; line-height: 1.6; }
        
        .features-section {
            margin-bottom: 1.75rem;
        }
        .features-section h4 {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .features-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .feature-tag {
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(16,185,129,0.1));
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .feature-tag:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(251,191,36,0.25), rgba(16,185,129,0.15));
        }
        
        .culture-tip {
            background: rgba(236,72,153,0.08);
            border: 1px solid rgba(236,72,153,0.15);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.75rem;
        }
        .culture-tip h4 {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .culture-tip p {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.85;
        }
        
        .greeting-box {
            background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(16,185,129,0.08));
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .greeting-box .lang {
            font-size: 0.75rem;
            opacity: 0.45;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .greeting-box .text {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fcd34d, rgba(251,191,36,0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .greeting-box .trans {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 0.5rem;
        }
        
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            padding: 1rem 1.5rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom) + 40px);
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3), transparent);
            z-index: 100;
            touch-action: manipulation;
        }
        .control-btn {
            padding: 0.8rem 1.75rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }
        .control-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        .control-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .progress-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            z-index: 99;
        }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, rgba(251,191,36,0.8), rgba(16,185,129,0.5));
            transition: width 0.1s linear;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f0f0f;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: rgba(251,191,36,0.8);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            box-shadow: 0 0 20px rgba(251,191,36,0.15);
        }
        .loading-text {
            font-size: 0.9rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }
        
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(35px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .volume-control {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            z-index: 10;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .volume-control:hover { opacity: 1; }
        .volume-control input {
            width: 90px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        .volume-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: rgba(251,191,36,0.8);
            border-radius: 50%;
            cursor: pointer;
        }
        
        .sound-toggle {
            position: fixed;
            right: 1.5rem;
            top: 1.5rem;
            z-index: 100;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .sound-toggle:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.3);
        }
        
        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr 1fr; }
            .city-name { font-size: 2.2rem; }
            .card-body { padding: 1.25rem; }
            .content { padding: 1rem; padding-top: max(1rem, env(safe-area-inset-top)); padding-bottom: 180px; }
            .street-scene { flex-direction: column; text-align: center; }
            .card-header { padding: 1.5rem; }
            .weather-icon { font-size: 1.8rem; }
            .city-meta { gap: 1.5rem; }
            .control-btn { padding: 0.7rem 1.25rem; font-size: 0.85rem; }
            .city-card { max-height: calc(100vh - 260px); margin-bottom: 200px; }
            footer { gap: 0.75rem; padding-bottom: max(1rem, env(safe-area-inset-bottom) + 50px); padding-left: 1rem; padding-right: 1rem; }
        }
        @media (max-width: 500px) {
            .info-grid { grid-template-columns: 1fr; }
            .city-name { font-size: 1.8rem; }
            .city-mood { font-size: 1rem; }
            .card-header { padding: 1.25rem; }
            .card-body { padding: 1rem; }
            .weather-icon { font-size: 1.5rem; }
            .city-subtitle { font-size: 0.9rem; }
            .meta-value { font-size: 0.9rem; }
            .feature-tag { padding: 0.4rem 1rem; font-size: 0.8rem; }
            .control-btn { padding: 0.6rem 1rem; font-size: 0.8rem; }
            .content { padding-bottom: 200px; }
            .city-card { max-height: calc(100vh - 280px); margin-bottom: 220px; }
            footer { gap: 0.5rem; padding-bottom: max(1rem, env(safe-area-inset-bottom) + 60px); padding-left: 0.75rem; padding-right: 0.75rem; }
            .sound-toggle { width: 40px; height: 40px; font-size: 1rem; right: 1rem; top: max(1rem, env(safe-area-inset-top)); }
            .volume-control { right: 1rem; bottom: max(6rem, env(safe-area-inset-bottom) + 50px); }
            .progress-bar { height: 4px; }
            .loading-spinner { width: 40px; height: 40px; }
            .loading-text { font-size: 0.8rem; }
        }
        @media (max-width: 375px) {
            .city-name { font-size: 1.6rem; }
            .weather-icon { font-size: 1.3rem; }
            .control-btn { padding: 0.5rem 0.8rem; font-size: 0.75rem; }
            .feature-tag { padding: 0.35rem 0.85rem; font-size: 0.75rem; }
            .info-card { padding: 1rem; }
            .arch-item { padding: 0.75rem 0; }
            .greeting-box .text { font-size: 1.2rem; }
            .content { padding-bottom: 220px; }
            .city-card { max-height: calc(100vh - 300px); margin-bottom: 240px; }
            footer { padding-bottom: max(1rem, env(safe-area-inset-bottom) + 70px); padding-left: 0.5rem; padding-right: 0.5rem; }
        }
        @media (orientation: landscape) and (max-width: 900px) {
            .city-card { max-height: 75vh; margin-bottom: 120px; }
            .content { padding: 0.75rem; }
            .card-header { padding: 1rem; }
            .card-body { padding: 1rem; }
            .city-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在连接世界各地...</div>
    </div>

    <img id="bgImage" src="" alt="城市风景">
    <div id="bgOverlay"></div>
    <canvas id="effectCanvas"></canvas>

    <div class="content">
        <header>
            <h1>云漫步</h1>
            <p>CITY WALKER</p>
        </header>

        <div class="city-card" id="cityCard">
            <div class="card-header">
                <div class="weather-icon" id="weatherIcon">🌤️</div>
                <div class="city-name" id="cityName">Tokyo</div>
                <div class="city-subtitle" id="citySubtitle">东京 · 日本</div>
                <div class="city-meta">
                    <div class="meta-item">
                        <span class="meta-label">当地时间</span>
                        <span class="meta-value" id="localTime">00:00</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">温度</span>
                        <span class="meta-value" id="localTemp">22°C</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">天气</span>
                        <span class="meta-value" id="localWeather">晴朗</span>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <div class="city-mood" id="cityMood">"在霓虹灯下，每个人都是自己故事的主角"</div>
                <div class="city-desc" id="cityDesc"></div>
                
                <div class="street-scene">
                    <span class="icon">🌆</span>
                    <span class="text" id="streetScene"></span>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <h4>🏛️ 必去地标</h4>
                        <div id="landmarksList"></div>
                    </div>
                    <div class="info-card">
                        <h4>🍜 当地美食</h4>
                        <div id="foodsList"></div>
                    </div>
                    <div class="info-card">
                        <h4>🎭 文化特色</h4>
                        <div id="cultureList"></div>
                    </div>
                </div>

                <div class="architecture-list">
                    <h4>🏰 知名建筑</h4>
                    <div id="architectureList"></div>
                </div>

                <div class="features-section">
                    <h4>✨ 城市特色</h4>
                    <div class="features-tags" id="featuresTags"></div>
                </div>

                <div class="culture-tip">
                    <h4>💡 趣闻</h4>
                    <p id="cultureText"></p>
                </div>

                <div class="greeting-box">
                    <div class="lang" id="greetingLang">日语</div>
                    <div class="text" id="greetingText">こんにちは</div>
                    <div class="trans" id="greetingTrans">你好</div>
                </div>
            </div>
        </div>

        <footer>
            <button class="control-btn" id="btnPrev" onclick="prevCity()">◀ 上一站</button>
            <button class="control-btn" id="btnRandom" onclick="randomCity()">🎲 随机漫游</button>
            <button class="control-btn" id="btnNext" onclick="nextCity()">下一站 ▶</button>
        </footer>
    </div>

    <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>
    <div class="volume-control">
        <input type="range" id="volumeSlider" min="0" max="100" value="40">
    </div>
    <div class="progress-bar">
        <div class="progress-bar-inner" id="progressBar"></div>
    </div>

    <script>
        const cities = [
            {
                name: 'Tokyo', country: '日本', subtitle: '东京',
                keyword: 'Tokyo street night neon city',
                weather: 'night', season: 'autumn', temp: '18°C',
                desc: '东京，日本的首都，一座充满未来感与传统韵味的城市。在这里，你可以在涩谷十字路口感受都市的脉搏，也可以在浅草寺体验千年的宁静。霓虹灯与樱花交织，构成了这座城市独特的魅力。',
                mood: '在霓虹灯下，每个人都是自己故事的主角',
                streetScene: '傍晚时分，涩谷的窄巷里居酒屋灯笼摇曳，上班族匆匆走过，便利店的暖光给寒冷的夜带来一丝温暖。秋叶散落街头，与霓虹灯的光芒交织成一幅迷人的画面。新宿的摩天大楼群在夜色中闪烁，仿佛置身于科幻世界。',
                landmarks: [
                    { name: '东京塔', icon: '🗼' },
                    { name: '浅草寺', icon: '⛩️' },
                    { name: '涩谷十字路口', icon: '🚦' }
                ],
                foods: [
                    { name: '拉面', icon: '🍜' },
                    { name: '寿司', icon: '🍣' },
                    { name: '天妇罗', icon: '🍤' }
                ],
                culture: ['茶道', '和服', '动漫'],
                architecture: [
                    { name: '东京塔', desc: '红白相间的铁塔，模仿巴黎埃菲尔铁塔建造，高333米，是东京的象征地标，夜晚灯光璀璨，从塔顶可俯瞰整个东京市区。' },
                    { name: '浅草寺雷门', desc: '东京最古老的寺庙之一，巨大的红色灯笼高悬于雷门之上，是日本传统文化的重要象征，仲见世商店街充满传统风情。' },

        function updateLocalTime(city) {
            if (timeInterval) clearInterval(timeInterval);
            
            const timeZones = {
                '日本': 9, '法国': 2, '美国': -4, '英国': 1, '意大利': 2,
                '澳大利亚': 10, '南非': 2, '希腊': 3, '荷兰': 2, '中国': 8,
                '西班牙': 2, '阿联酋': 4, '捷克': 2, '印尼': 7, '土耳其': 3,
                '俄罗斯': 3, '泰国': 7
            };
            
            const offset = timeZones[city.country] || 8;
            
            function update() {
                const now = new Date();
                const utc = now.getTime() + now.getTimezoneOffset() * 60000;
                const local = new Date(utc + offset * 3600000);
                const hours = local.getHours().toString().padStart(2, '0');
                const minutes = local.getMinutes().toString().padStart(2, '0');
                document.getElementById('localTime').textContent = `${hours}:${minutes}`;
            }
            
            update();
            timeInterval = setInterval(update, 60000);
        }

        function updateParticles(weather) {
            effectParticles = [];
            const count = weather === 'rain' ? 200 : weather === 'snow' ? 120 : weather === 'sunny' ? 50 : weather === 'night' ? 60 : 80;
            
            for (let i = 0; i < count; i++) {
                effectParticles.push(createParticle(weather));
            }
        }

        function createParticle(weather) {
            const base = { x: Math.random() * width, y: Math.random() * height, opacity: Math.random() * 0.5 + 0.15 };
            
            switch (weather) {
                case 'rain':
                    return { ...base, vx: 0, vy: 10 + Math.random() * 6, length: 15 + Math.random() * 15, width: 0.8 };
                case 'snow':
                    return { ...base, vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 1.5, radius: 1.5 + Math.random() * 2.5, wobble: Math.random() * Math.PI * 2 };
                case 'sunny':
                    return { ...base, vx: (Math.random() - 0.5) * 0.3, vy: -0.2 - Math.random() * 0.3, radius: 0.8 + Math.random() * 1.5, type: 'sparkle' };
                case 'cloudy':
                    return { ...base, vx: 0.3 + Math.random() * 0.3, vy: (Math.random() - 0.5) * 0.15, radius: 80 + Math.random() * 100, type: 'cloud' };
                default:
                    return { ...base, vx: (Math.random() - 0.5) * 0.15, vy: -0.1 - Math.random() * 0.15, radius: 0.5 + Math.random() * 1, type: 'star' };
            }
        }

        function animateParticles() {
            eCtx.clearRect(0, 0, width, height);
            
            effectParticles.forEach(p => {
                eCtx.globalAlpha = p.opacity;
                
                if (p.type === 'cloud') {
                    eCtx.fillStyle = 'rgba(255,255,255,0.08)';
                    eCtx.beginPath();
                    eCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    eCtx.fill();
                } else if (p.type === 'sparkle') {
                    eCtx.fillStyle = '#fff';
                    eCtx.beginPath();
                    eCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    eCtx.fill();
                } else if (p.type === 'star') {
                    eCtx.fillStyle = '#fff';
                    eCtx.beginPath();
                    eCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    eCtx.fill();
                } else if (p.length) {
                    eCtx.strokeStyle = 'rgba(174, 194, 224, 0.6)';
                    eCtx.lineWidth = p.width;
                    eCtx.beginPath();
                    eCtx.moveTo(p.x, p.y);
                    eCtx.lineTo(p.x + p.vx, p.y + p.vy);
                    eCtx.stroke();
                } else {
                    eCtx.fillStyle = '#fff';
                    eCtx.beginPath();
                    eCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    eCtx.fill();
                }
                
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.wobble !== undefined) {
                    p.wobble += 0.05;
                    p.x += Math.sin(p.wobble) * 0.5;
                }
                
                if (p.y > height || p.y < -p.radius * 2 || p.x > width + 50 || p.x < -50) {
                    p.x = Math.random() * width;
                    p.y = p.vy > 0 ? -20 : height + 20;
                }
            });
            
            requestAnimationFrame(animateParticles);
        }

        function updateSound(city) {
            stopSound();
            if (!isSoundOn) return;
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            createAmbientSound(city.soundType || 'general');
        }

        function createAmbientSound(type) {
            gainNode = audioCtx.createGain();
            gainNode.gain.value = volume * 0.25;
            gainNode.connect(audioCtx.destination);

            createBaseNoise(type);
            createMidNoise(type);
            createMelody(type);
            
            switch (type) {
                case 'coastal':
                    createOceanWaves();
                    break;
                case 'european':

                    ambientInterval = setInterval(() => { if (Math.random() > 0.75) createBellSound(); }, 20000);

                case 'asian':

                    ambientInterval = setInterval(() => { if (Math.random() > 0.65) createWindChimes(); }, 15000);
                    break;
                case 'winter':
                    createWindSound();
                    break;
                default:
                    createGeneralAmbience();
            }
        }

        function createBaseNoise(type) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.3;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = type === 'coastal' ? 400 : type === 'asian' ? 300 : 500;
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = volume * 0.15;
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(gainNode);
            noise.start();
            
            noiseNodes.push({ node: noise, gain: noiseGain });
        }

        function createMidNoise(type) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.15;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = type === 'coastal' ? 800 : type === 'asian' ? 600 : 1000;
            filter.Q.value = 0.5;
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = volume * 0.08;
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(gainNode);
            noise.start();
            
            noiseNodes.push({ node: noise, gain: noiseGain });
        }

        function createMelody(type) {
            const pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
            const intervals = [3000, 4000, 5000, 6000];
            
            function playNote() {
                const note = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)];
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = note;
                
                noteGain.gain.setValueAtTime(0, audioCtx.currentTime);
                noteGain.gain.linearRampToValueAtTime(volume * 0.06, audioCtx.currentTime + 0.1);
                noteGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
                
                osc.connect(noteGain);
                noteGain.connect(gainNode);
                osc.start();
                osc.stop(audioCtx.currentTime + 2);
                
                const nextInterval = intervals[Math.floor(Math.random() * intervals.length)];
                setTimeout(playNote, nextInterval);
            }
            
            setTimeout(playNote, 2000);
        }

        function createOceanWaves() {
            const waveFreq = 0.1;

            waveGain.gain.value = volume * 0.12;
            waveGain.connect(gainNode);
            
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {

            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 600;
            
            noise.connect(filter);
            filter.connect(waveGain);
            noise.start();
            
            noiseNodes.push({ node: noise, gain: waveGain });
            
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = waveFreq;
            
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.05;
            
            lfo.connect(lfoGain);
            lfoGain.connect(waveGain.gain);
            lfo.start();
            
            noiseNodes.push({ node: lfo, gain: lfoGain });
        }

        function createBellSound() {
            const tones = [523.25, 659.25, 783.99, 1046.50];
            tones.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const bellGain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    bellGain.gain.setValueAtTime(0, audioCtx.currentTime);
                    bellGain.gain.linearRampToValueAtTime(volume * 0.04, audioCtx.currentTime + 0.05);
                    bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
                    
                    osc.connect(bellGain);
                    bellGain.connect(gainNode);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 3);
                }, i * 50);
            });
        }

        function createWindChimes() {
            const chimeFreqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
            const count = 3 + Math.floor(Math.random() * 3);
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const freq = chimeFreqs[Math.floor(Math.random() * chimeFreqs.length)];
                    const osc = audioCtx.createOscillator();
                    const chimeGain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    chimeGain.gain.setValueAtTime(0, audioCtx.currentTime);
                    chimeGain.gain.linearRampToValueAtTime(volume * 0.03, audioCtx.currentTime + 0.03);
                    chimeGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                    
                    osc.connect(chimeGain);
                    chimeGain.connect(gainNode);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2.5);
                }, i * 150 + Math.random() * 200);
            }
        }

        function createWindSound() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.2;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            
            const windGain = audioCtx.createGain();
            windGain.gain.value = volume * 0.1;
            windGain.connect(gainNode);
            
            noise.connect(filter);
            filter.connect(windGain);
            noise.start();
            
            noiseNodes.push({ node: noise, gain: windGain });
        }

        function createGeneralAmbience() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 300;
            
            const ambienceGain = audioCtx.createGain();
            ambienceGain.gain.value = volume * 0.08;
            ambienceGain.connect(gainNode);
            
            noise.connect(filter);
            filter.connect(ambienceGain);
            noise.start();
            
            noiseNodes.push({ node: noise, gain: ambienceGain });
        }

        function stopSound() {
            noiseNodes.forEach(n => {
                try { n.node.stop(); } catch(e) {}
                try { n.gain.disconnect(); } catch(e) {}
            });
            noiseNodes = [];
            if (ambientInterval) {
                clearInterval(ambientInterval);
                ambientInterval = null;
            }
            if (gainNode) {
                gainNode.disconnect();
                gainNode = null;
            }
        }

        function updateVolume() {
            if (gainNode) {
                gainNode.gain.value = volume * 0.25;
            }
        }

        function toggleSound() {
            isSoundOn = !isSoundOn;
            document.getElementById('soundToggle').textContent = isSoundOn ? '🔊' : '🔇';
            if (isSoundOn) {
                updateSound(cities[currentCityIndex]);
            } else {
                stopSound();
            }
        }

        function setButtonsDisabled(disabled) {
            const buttons = document.querySelectorAll('.control-btn');
            buttons.forEach(btn => {
                if (disabled) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            });
        }

        function bindButtonEvents() {
            const buttons = document.querySelectorAll('.control-btn');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', function(e) {
                    this.style.transform = 'scale(0.95)';
                }, { passive: true });
                
                btn.addEventListener('touchend', function(e) {
                    if (!this.classList.contains('disabled')) {
                        this.style.transform = '';
                    }
                }, { passive: true });
                
                btn.addEventListener('touchcancel', function(e) {
                    this.style.transform = '';
                }, { passive: true });
            });
        }

        function prevCity() {
            if (isTransitioning) return;
            currentCityIndex = (currentCityIndex - 1 + cities.length) % cities.length;
            loadCity(currentCityIndex);
        }

        function nextCity() {
            if (isTransitioning) return;
            currentCityIndex = (currentCityIndex + 1) % cities.length;
            loadCity(currentCityIndex);
        }

        function randomCity() {
            if (isTransitioning) return;
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * cities.length);
            } while (newIndex === currentCityIndex);
            loadCity(newIndex);
        }

        function startAutoSwitch() {
            if (progressTimer) clearInterval(progressTimer);
            
            let progress = 0;
            const duration = 60000;
            
            progressTimer = setInterval(() => {
                progress += 100;
                const percentage = Math.min((progress / duration) * 100, 100);
                document.getElementById('progressBar').style.width = `${percentage}%`;
                
                if (progress >= duration) {
                    nextCity();
                }
            }, 100);
        }

        function resetProgress() {
            if (progressTimer) clearInterval(progressTimer);
            document.getElementById('progressBar').style.width = '0%';
            startAutoSwitch();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
